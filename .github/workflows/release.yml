name: release

# Build and attach the `nix-helper` binary to a GitHub Release whenever
# a tag matching `vYYYY.MM.DD.NN` is pushed.
#
# The local `scripts/release.sh` also uploads an asset for convenience,
# but this workflow is the canonical source of truth — it builds the
# binary from CI, not from the developer's machine.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build nix-helper (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: nix-helper
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Generate SHA256 sidecar
        run: |
          cd target/${{ matrix.target }}/release
          sha256sum nix-helper > nix-helper.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            target/${{ matrix.target }}/release/nix-helper
            target/${{ matrix.target }}/release/nix-helper.sha256
          if-no-files-found: error

  attach:
    name: Attach to release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nix-helper

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nix-helper
            nix-helper.sha256
          fail_on_unmatched_files: true